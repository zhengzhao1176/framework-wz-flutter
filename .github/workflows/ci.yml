name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install deps
        run: flutter pub get
      - name: Format check
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze
      - name: Unit + widget tests with coverage
        run: flutter test --coverage --reporter expanded
      - name: Coverage report
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            echo 'Coverage produced.'
          else
            echo '::warning::No coverage file produced.'
          fi

  build-web:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build web (mock)
        run: flutter build web --release --dart-define=USE_MOCK=true

  build-apk:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build APK (mock)
        run: flutter build apk --release --dart-define=USE_MOCK=true
